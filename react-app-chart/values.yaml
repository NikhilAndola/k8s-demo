image:
  repository: nikhilandola/react-k8s-demo
  tag: latest
  pullPolicy: Always

service:
  type: NodePort
  port: 80

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

containerPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

replicaCount: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  rules: []

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
imagePullSecrets: []
nodeSelector: {}
tolerations: []
affinity: {}
volumes: []
volumeMounts: []
